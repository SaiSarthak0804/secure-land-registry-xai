<!DOCTYPE html>

<html>

<head>

    <title>
        Secure Land Registry Login
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="container">

    <div class="login-box">

        <h2 class="text-center mb-4">
            Secure Land Registry
        </h2>

        <h5 class="text-center mb-4">
            Agricultural Industry 5.0
        </h5>

        {% if error %}

            <div class="alert alert-danger">

                {{ error }}

            </div>

        {% endif %}

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-success w-100"
            >

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
