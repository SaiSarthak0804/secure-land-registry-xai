<!DOCTYPE html>

<html>

<head>

    <title>
        Search Land
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="container mt-5">

    <div class="card p-5 shadow">

        <h2 class="text-center mb-4">

            Search Land Record

        </h2>

        <form method="POST">

            <div class="mb-3">

                <label>
                    Enter Land ID
                </label>

                <input
                    type="text"
                    name="land_id"
                    class="form-control"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-success w-100"
            >

                Search Land

            </button>

        </form>

        {% if record %}

        <div class="alert alert-info mt-4">

            <h4>Land Details</h4>

            <hr>

            <p>
                <strong>Owner Name:</strong>
                {{ record[1] }}
            </p>

            <p>
                <strong>Land ID:</strong>
                {{ record[2] }}
            </p>

            <p>
                <strong>Location:</strong>
                {{ record[3] }}
            </p>

            <p>
                <strong>Area:</strong>
                {{ record[4] }}
            </p>

            <p>
                <strong>Registration Date:</strong>
                {{ record[5] }}
            </p>

        </div>

        {% endif %}

        {% if error %}

        <div class="alert alert-danger mt-4">

            {{ error }}

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
