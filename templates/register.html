<!DOCTYPE html>

<html>

<head>

    <title>
        Register Land
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="container mt-5">

    <div class="card p-5 shadow">

        <h2 class="text-center mb-4">

            Land Registration Form

        </h2>

        <form method="POST">

            <div class="mb-3">

                <label>
                    Owner Name
                </label>

                <input
                    type="text"
                    name="owner_name"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label>
                    Land ID
                </label>

                <input
                    type="text"
                    name="land_id"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label>
                    Location
                </label>

                <input
                    type="text"
                    name="location"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label>
                    Area
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="area"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label>
                    Transaction Count
                </label>

                <input
                    type="number"
                    name="transaction_count"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label>
                    Market Value
                </label>

                <input
                    type="number"
                    name="market_value"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label>
                    Owner History Count
                </label>

                <input
                    type="number"
                    name="owner_history"
                    class="form-control"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-success w-100"
            >

                Register Land

            </button>

        </form>

        {% if result %}

<div class="alert alert-info mt-4">

    {{ result }}

</div>

{% endif %}

{% if shap_image %}

<div class="card mt-4 p-3">

    <h4 class="text-center mb-3">

        Explainable AI (XAI)

    </h4>

    <img
        src="{{ url_for('static', filename='shap_plot.png') }}"
        class="img-fluid"
    >

</div>

{% endif %}

    </div>

</div>

</body>

</html>

{% include 'navbar.html' %}
