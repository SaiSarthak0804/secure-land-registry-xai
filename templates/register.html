<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Land Registration</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-5 mb-5">

    <div class="card shadow p-5"
         style="border-radius:20px;">

        <h1 class="text-center mb-5"
            style="color:#163B65;">

            Secure Land Registration

        </h1>

        <form method="POST">

            <!-- OWNER DETAILS -->

            <h3 class="mb-4 text-success">

                Owner Details

            </h3>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Owner Name

                    </label>

                    <input type="text"
                           name="owner_name"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Aadhaar Number

                    </label>

                    <input type="text"
                           name="aadhaar_number"
                           class="form-control"
                           required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Phone Number

                    </label>

                    <input type="text"
                           name="phone_number"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Address

                    </label>

                    <input type="text"
                           name="address"
                           class="form-control"
                           required>

                </div>

            </div>

            <!-- LAND DETAILS -->

            <h3 class="mb-4 text-success mt-4">

                Land Details

            </h3>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Land ID

                    </label>

                    <input type="text"
                           name="land_id"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Survey Number

                    </label>

                    <input type="text"
                           name="survey_number"
                           class="form-control"
                           required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        District

                    </label>

                    <input type="text"
                           name="district"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        State

                    </label>

                    <input type="text"
                           name="state"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        Land Type

                    </label>

                    <select name="land_type"
                            class="form-select"
                            required>

                        <option value="">
                            Select
                        </option>

                        <option value="Agricultural">
                            Agricultural
                        </option>

                        <option value="Residential">
                            Residential
                        </option>

                        <option value="Commercial">
                            Commercial
                        </option>

                    </select>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Location

                    </label>

                    <input type="text"
                           name="location"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Area (Acres)

                    </label>

                    <input type="number"
                           step="0.1"
                           name="area"
                           class="form-control"
                           required>

                </div>

            </div>

            <!-- FRAUD ANALYSIS DETAILS -->

            <h3 class="mb-4 text-success mt-4">

                Fraud Analysis Details

            </h3>

            <div class="row">

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        Transaction Count

                    </label>

                    <input type="number"
                           name="transaction_count"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        Market Value

                    </label>

                    <input type="number"
                           name="market_value"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-4 mb-4">

                    <label class="form-label">

                        Owner History Count

                    </label>

                    <input type="number"
                           name="owner_history"
                           class="form-control"
                           required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Transfer Frequency

                    </label>

                    <input type="number"
                           name="transfer_frequency"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Verification Status

                    </label>

                    <select name="verification_status"
                            class="form-select"
                            required>

                        <option value="Pending">
                            Pending
                        </option>

                        <option value="Verified">
                            Verified
                        </option>

                    </select>

                </div>

            </div>

            <button type="submit"
                    class="btn btn-success w-100 btn-lg mt-3">

                Register Land

            </button>

        </form>

        {% if result %}

            <div class="alert alert-info mt-4">

                {{ result }}

            </div>

        {% endif %}

        {% if shap_image %}

            <div class="card mt-5 p-4">

                <h3 class="text-center mb-4">

                    Explainable AI (XAI)

                </h3>

                <img
                    src="{{ url_for('static', filename='shap_plot.png') }}"
                    class="img-fluid">

            </div>

        {% endif %}

    </div>

</div>

</body>

</html>
