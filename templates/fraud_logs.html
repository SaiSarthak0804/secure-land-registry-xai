<!DOCTYPE html>

<html>

<head>

    <title>
        Fraud Monitoring Logs
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2 class="text-center mb-4 text-danger">

            Fraud Monitoring Logs

        </h2>

        {% if fraud_records %}

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>

                    <th>Land ID</th>

                    <th>Owner Name</th>

                    <th>Fraud Reason</th>

                </tr>

            </thead>

            <tbody>

                {% for record in fraud_records %}

                <tr>

                    <td>{{ record[0] }}</td>

                    <td>{{ record[1] }}</td>

                    <td>{{ record[2] }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        {% else %}

        <div class="alert alert-success">

            No Fraud Records Found.

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
